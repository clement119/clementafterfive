<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Journal</title>
    <meta name="color-scheme" content="light dark" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=6" />
  </head>
  <body>
    <!-- Settings -->
    <div class="settings" id="settings">
      <button
        class="settings-btn"
        id="settings-btn"
        type="button"
        aria-label="Settings"
        aria-haspopup="true"
        aria-expanded="false"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>

      <div class="settings-panel" id="settings-panel" role="menu" hidden>
        <p class="settings-title">Settings</p>
        <div class="settings-row">
          <span class="settings-label">Dark mode</span>
          <button
            class="toggle"
            id="theme-toggle"
            type="button"
            role="switch"
            aria-checked="false"
            aria-label="Toggle dark mode"
          >
            <span class="toggle-knob"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="page">
      <header class="masthead">
        <p class="eyebrow">Learning Journal</p>
        <h1 id="note-title">—</h1>
        <p class="subtitle" id="note-subtitle"></p>
        <p class="meta" id="note-meta"></p>
      </header>

      <nav class="dimensions" id="dimensions" aria-label="Dimensions"></nav>

      <main id="content"></main>

      <footer class="colophon" id="note-footer"></footer>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>

    <!--
      Load scripts with a cache-busting query so new notes always show up
      immediately, even though GitHub Pages caches static files. data.js must
      load before app.js.
    -->
    <script>
      (function () {
        var v = Date.now();
        function load(src, next) {
          var s = document.createElement("script");
          s.src = src + "?v=" + v;
          s.onload = next || function () {};
          document.body.appendChild(s);
        }
        load("data.js", function () {
          load("app.js");
        });
      })();
    </script>
  </body>
</html>
